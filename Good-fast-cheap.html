<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good - Fast - Cheap</title>
    <link rel="stylesheet" href="Good-fast-cheap.css">
</head>

<body>
    <div class="container">
        <h2><u>CHOOSE YOUR POISON</u></h2>
        <div class="toggle-row">
            <input type="checkbox" id="good" class="toggle-checkbox">
            <label for="good" class="toggle-label good-color"></label>
            <span class="toggle-text">GOOD</span>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="cheap" class="toggle-checkbox">
            <label for="cheap" class="toggle-label cheap-color"></label>
            <span class="toggle-text">CHEAP</span>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="fast" class="toggle-checkbox">
            <label for="fast" class="toggle-label fast-color"></label>
            <span class="toggle-text">FAST</span>
        </div>
    </div>


    <script src="Good-fast-cheap.js"></script>
</body>

</html>
